<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NectarMine — Meus Apiários</title>
  <link rel="stylesheet" href="css/global.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js"></script>
  <style>
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
    .page-header h1 { font-size:22px; color:var(--branco); }

    /* Sumário de produção */
    .prod-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
    .sum-card { background:var(--card); backdrop-filter:blur(10px); border:1px solid var(--borda2); border-radius:var(--radius); padding:16px; text-align:center; }
    .sum-card strong { display:block; font-size:22px; color:var(--amarelo); }
    .sum-card span   { font-size:11px; color:var(--texto3); }

    /* Grid de apiários possuídos */
    .machines-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px,1fr)); gap:18px; }
    .machine-card {
      background:var(--card); backdrop-filter:blur(10px);
      border:1px solid var(--borda2); border-radius:var(--radius);
      overflow:hidden; transition:border-color .2s, transform .2s;
    }
    .machine-card:hover { border-color:var(--borda); transform:translateY(-3px); }
    .machine-card-header {
      padding:14px 16px 10px;
      background:linear-gradient(135deg, var(--amarelo-bg2), transparent);
      border-bottom:1px solid var(--borda2);
      display:flex; align-items:center; gap:12px;
    }
    .machine-emoji { width:40px; height:40px; border-radius:8px; object-fit:cover; flex-shrink:0; }
    .machine-card-header h3 { font-size:15px; color:var(--branco); }
    .machine-card-header .level { font-size:11px; color:var(--texto3); }
    .machine-badge-status { margin-left:auto; font-size:10px; padding:3px 10px; border-radius:20px; font-weight:bold; }
    .badge-ativo    { background:var(--verde-bg);  color:var(--verde);   border:1px solid var(--verde); }

    .machine-card-body { padding:14px 16px; }
    .machine-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .mstat { background:var(--amarelo-bg2); border-radius:var(--radius-sm); padding:8px 10px; }
    .mstat label { font-size:10px; color:var(--texto3); display:block; }
    .mstat strong { font-size:14px; color:var(--amarelo); }

    .machine-card-footer { display:flex; gap:8px; }

    /* Adicionar apiário */
    .add-machine-card {
      background:var(--amarelo-bg2); border:2px dashed var(--borda);
      border-radius:var(--radius); padding:32px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      transition:all .2s;
    }
    .add-machine-card:hover { background:var(--amarelo-bg); border-color:var(--amarelo); }
    .add-machine-card i { font-size:32px; color:var(--texto3); }
    .add-machine-card span { color:var(--texto2); font-size:14px; }

    /* Loja (modal interno) */
    .shop-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    .shop-overlay.open { display:flex; }
    .shop-modal { background:var(--preto3); border:1px solid var(--borda); border-radius:var(--radius-lg); padding:28px; width:760px; max-width:95vw; max-height:85vh; overflow-y:auto; }
    .shop-modal h2 { font-size:18px; color:var(--branco); margin-bottom:6px; }
    .shop-section-label { font-size:11px; color:var(--texto3); text-transform:uppercase; letter-spacing:1px; margin:18px 0 10px; }
    .shop-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(190px,1fr)); gap:14px; }
    .shop-item { background:var(--card); border:1px solid var(--borda2); border-radius:var(--radius); padding:16px; text-align:center; transition:border-color .2s; }
    .shop-item:hover { border-color:var(--borda); }
    .shop-item .shop-img { width:64px; height:64px; object-fit:cover; border-radius:10px; margin:0 auto 8px; display:block; }
    .shop-item .emoji { font-size:32px; margin-bottom:6px; }
    .shop-item h4 { font-size:13px; color:var(--branco); margin-bottom:4px; }
    .shop-item p  { font-size:11px; color:var(--texto3); margin-bottom:10px; }
    .shop-item .price { font-size:15px; color:var(--amarelo); font-weight:bold; margin-bottom:10px; }
    .shop-item .price.maxed { color:var(--texto3); font-size:12px; }

    @media(max-width:900px){ .prod-summary{grid-template-columns:1fr 1fr;} }
    @media(max-width:600px){ .prod-summary{grid-template-columns:1fr;} }
  </style>
</head>
<body>

<!-- AD LATERAL ESQUERDA (160x600 Adsterra) -->

  .nm-ad-sky-left { position:fixed; left:0; top:50%; transform:translateY(-50%); z-index:15; width:160px; }
  @media (max-width:1200px){ .nm-ad-sky-left{ display:none; } }
</style>

</div>
<a href="transicao.html?to=dashboard.html" class="btn-voltar-dashboard"><i class="fa-solid fa-arrow-left"></i> Voltar ao Dashboard</a>

<!-- AD TOPO -->
<div class="ad-topo">
  <iframe src="https://zerads.com/ad/ad.php?width=468&ref=11517" marginwidth="0" marginheight="0" width="468" height="60" scrolling="no" frameborder="0" style="border:0;"></iframe>
  <div class="ad-topo-title">Meus Apiários - NectarMine</div>
</div>

<div class="nm-layout" style="margin-left:0;">
  <main class="page-content" style="padding:10px 20px 30px;">

    <div class="page-header">
      <h1><i class="fa-solid fa-industry" style="color:var(--amarelo)"></i> Meus Apiários</h1>
      <button class="btn btn-primary" onclick="abrirLoja()">
        <i class="fa-solid fa-plus"></i> Comprar Apiário
      </button>
    </div>

    <!-- Sumário -->
    <div class="prod-summary">
      <div class="sum-card"><strong id="sum-ativos">0</strong><span>Apiários ativos</span></div>
      <div class="sum-card"><strong id="sum-producao">0/h</strong><span>Produção total</span></div>
      <div class="sum-card"><strong id="sum-dia">0/dia</strong><span>Potes / dia</span></div>
      <div class="sum-card"><strong id="sum-flores">0</strong><span>🌸 Flores restantes</span></div>
    </div>

    <!-- AD mid -->
    <div class="anuncio anuncio-300" style="float:right;margin:0 0 16px 20px;">
      <script>
        atOptions = {
          'key' : '52eb13a8f3b629e8982096e4430f5c40',
          'format' : 'iframe',
          'height' : 250,
          'width' : 300,
          'params' : {}
        };
      </script>
      <script src="https://www.highperformanceformat.com/52eb13a8f3b629e8982096e4430f5c40/invoke.js"></script>
    </div>

    <!-- Grid de apiários -->
    <div class="machines-grid" id="machines-grid" style="clear:both;">
      <div style="color:var(--texto3);font-size:13px;">Carregando seus apiários...</div>
    </div>

    <!-- Propagandas do rodapé -->
    <div class="rodape-4ads">
      <div>
        <script type="text/javascript">
          if (window.aclib) { aclib.runBanner({ zoneId: '11566166' }); }
        </script>
      </div>
      <div>
        <script type="text/javascript">
          if (window.aclib) { aclib.runBanner({ zoneId: '11566158' }); }
        </script>
      </div>
      <iframe src="https://zerads.com/ad/ad.php?width=728&ref=11517" marginwidth="0" marginheight="0" width="728" height="90" scrolling="no" frameborder="0" style="border:0;"></iframe>
      <div>
        <script type="text/javascript">
          if (window.aclib) { aclib.runBanner({ zoneId: '11566174' }); }
        </script>
      </div>
    </div>

  </main>
</div>

<!-- LOJA MODAL -->
<div class="shop-overlay" id="shop">
  <div class="shop-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <h2>🏪 Loja de Apiários</h2>
      <button class="btn btn-sm btn-ghost" onclick="fecharLoja()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="anuncio anuncio-728" style="margin-bottom:16px;"><!-- AD 728×90 -->Publicidade 728×90</div>

    <div class="shop-section-label">Apiários</div>
    <div class="shop-grid" id="shop-apiarios">
      <div style="color:var(--texto3);font-size:12px;">Carregando...</div>
    </div>

    <div class="shop-section-label">Capacidade do Reservatório</div>
    <div class="shop-grid" id="shop-capacidade"></div>

    <div class="shop-section-label">Relógio (Flores / Energia)</div>
    <div class="shop-grid" id="shop-relogio"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/global.js"></script>
<script src="js/api.js"></script>
<script>
  let STATUS = null;

  document.addEventListener('nm:ready', carregar);

  async function carregar() {
    try {
      STATUS = await NM_API.jogoStatus();
      renderSumario();
      renderApiarios();
      renderLoja();
    } catch (e) {
      NM_SWAL.error('Ops!', e.message);
    }
  }

  function renderSumario() {
    const s = STATUS;
    document.getElementById('sum-ativos').textContent = nmFormatInt(s.apiarios.length);
    document.getElementById('sum-producao').textContent = nmFormatInt(s.producao_hora) + '/h';
    document.getElementById('sum-dia').textContent = nmFormatInt(s.producao_hora * 24) + '/dia';
    document.getElementById('sum-flores').textContent = nmFormatInt(Math.floor(s.flores));
  }

  function renderApiarios() {
    const grid = document.getElementById('machines-grid');
    const contagem = {};
    for (const a of STATUS.apiarios) contagem[a.tipo] = (contagem[a.tipo] || 0) + 1;

    const tipos = Object.keys(contagem);
    if (tipos.length === 0) {
      grid.innerHTML = `
        <div class="add-machine-card" onclick="abrirLoja()" style="cursor:pointer;grid-column:1/-1;">
          <i class="fa-solid fa-plus"></i>
          <span>Você ainda não tem nenhum apiário</span>
          <small style="color:var(--texto3);font-size:11px;">A partir de ${nmFormatInt(STATUS.loja.apiarios.iniciante.preco)} NCT</small>
        </div>`;
      return;
    }

    let html = '';
    for (const tipo of tipos) {
      const spec = STATUS.loja.apiarios[tipo];
      const qtd = contagem[tipo];
      html += `
        <div class="machine-card">
          <div class="machine-card-header">
            <img class="machine-emoji" src="${spec.imagem}" alt="${spec.nome}"/>
            <div><h3>${spec.nome}</h3><div class="level">${qtd}x possuído${qtd > 1 ? 's' : ''}</div></div>
            <span class="machine-badge-status badge-ativo">ATIVO</span>
          </div>
          <div class="machine-card-body">
            <div class="machine-stats">
              <div class="mstat"><label>Produção unitária</label><strong>${spec.producao}/h</strong></div>
              <div class="mstat"><label>Custo flores unit.</label><strong>${spec.energia}/h</strong></div>
              <div class="mstat"><label>Produção total</label><strong>${nmFormatInt(spec.producao * qtd)}/h</strong></div>
              <div class="mstat"><label>${spec.bloqueado ? 'Limite atingido' : 'Próximo custa'}</label><strong>${spec.bloqueado ? '—' : nmFormatInt(spec.preco_atual) + ' NCT'}</strong></div>
            </div>
            <div class="machine-card-footer">
              <button class="btn btn-sm btn-primary" ${spec.bloqueado ? 'disabled' : ''} onclick="comprarApiario('${tipo}')">
                <i class="fa-solid fa-plus"></i> Comprar mais um
              </button>
            </div>
          </div>
        </div>`;
    }

    html += `
      <div class="add-machine-card" onclick="abrirLoja()" style="cursor:pointer;">
        <i class="fa-solid fa-plus"></i>
        <span>Comprar novo apiário</span>
        <small style="color:var(--texto3);font-size:11px;">Veja todos os tipos na loja</small>
      </div>`;
    grid.innerHTML = html;
  }

  function renderLoja() {
    const l = STATUS.loja;

    document.getElementById('shop-apiarios').innerHTML = Object.values(l.apiarios).map(spec => `
      <div class="shop-item">
        <img class="shop-img" src="${spec.imagem}" alt="${spec.nome}"/>
        <h4>${spec.nome}</h4>
        <p>${spec.producao} potes/h · ${spec.energia} flores/h · ${spec.possui} possuído(s)</p>
        ${spec.bloqueado
          ? `<div class="price maxed">Limite de ${spec.max} atingido</div><button class="btn btn-sm btn-block" disabled>Indisponível</button>`
          : `<div class="price">${nmFormatInt(spec.preco_atual)} NCT</div><button class="btn btn-sm btn-primary btn-block" onclick="comprarApiario('${spec.tipo}')">Comprar</button>`
        }
      </div>
    `).join('');

    const cap = l.capacidade;
    document.getElementById('shop-capacidade').innerHTML = `
      <div class="shop-item">
        <div class="emoji">🏺</div>
        <h4>+${cap.incremento} de capacidade</h4>
        <p>Atual: ${nmFormatInt(cap.atual)} · Compras: ${cap.compras}/${cap.max_compras}</p>
        ${cap.proximo_preco === null
          ? `<div class="price maxed">Limite atingido</div><button class="btn btn-sm btn-block" disabled>Indisponível</button>`
          : `<div class="price">${nmFormatInt(cap.proximo_preco)} NCT</div><button class="btn btn-sm btn-primary btn-block" onclick="comprarCapacidade()">Comprar</button>`
        }
      </div>`;

    const rel = l.relogio;
    document.getElementById('shop-relogio').innerHTML = `
      <div class="shop-item">
        <div class="emoji">🌼</div>
        <h4>+${rel.flores_por_compra} Flores</h4>
        <p>Compras: ${rel.compras}/${rel.max_compras}</p>
        ${rel.proximo_preco === null
          ? `<div class="price maxed">Limite atingido</div><button class="btn btn-sm btn-block" disabled>Indisponível</button>`
          : `<div class="price">${nmFormatInt(rel.proximo_preco)} NCT</div><button class="btn btn-sm btn-primary btn-block" onclick="comprarRelogio()">Comprar</button>`
        }
      </div>`;
  }

  function abrirLoja() { document.getElementById('shop').classList.add('open'); }
  function fecharLoja() { document.getElementById('shop').classList.remove('open'); }

  async function comprarApiario(tipo) {
    const spec = STATUS.loja.apiarios[tipo];
    const { isConfirmed } = await NM_SWAL.confirm(
      `Comprar ${spec.nome}`,
      `Custo: <strong>${nmFormatInt(spec.preco_atual)} NCT</strong><br/>Este apiário será ativado imediatamente.`
    );
    if (!isConfirmed) return;
    try {
      await NM_API.comprarApiario(tipo);
      await carregar();
      NM_SWAL.success('Compra realizada!', `<strong>${spec.nome}</strong> foi adicionado à sua colmeia e já está produzindo mel!`);
    } catch (e) {
      NM_SWAL.error('Ops!', e.message);
    }
  }

  async function comprarCapacidade() {
    const cap = STATUS.loja.capacidade;
    const { isConfirmed } = await NM_SWAL.confirm(
      'Ampliar Capacidade',
      `Custo: <strong>${nmFormatInt(cap.proximo_preco)} NCT</strong><br/>+${cap.incremento} de capacidade no reservatório.`
    );
    if (!isConfirmed) return;
    try {
      await NM_API.comprarCapacidade();
      await carregar();
      NM_SWAL.success('Capacidade ampliada!', 'Seu reservatório agora comporta mais mel.');
    } catch (e) {
      NM_SWAL.error('Ops!', e.message);
    }
  }

  async function comprarRelogio() {
    const rel = STATUS.loja.relogio;
    const { isConfirmed } = await NM_SWAL.confirm(
      'Comprar Flores',
      `Custo: <strong>${nmFormatInt(rel.proximo_preco)} NCT</strong><br/>+${rel.flores_por_compra} flores imediatamente.`
    );
    if (!isConfirmed) return;
    try {
      await NM_API.comprarRelogio();
      await carregar();
      NM_SWAL.success('Flores recarregadas!', `+${rel.flores_por_compra} flores adicionadas.`);
    } catch (e) {
      NM_SWAL.error('Ops!', e.message);
    }
  }
</script>
</body>
</html>
