  <style>
    /* Banner Central de Missões */
    .missoes-banner {
      position:relative; overflow:hidden;
      background:linear-gradient(135deg, rgba(255,215,0,.08), rgba(123,47,190,.06));
      border:1px solid var(--borda); border-radius:var(--radius-lg);
      padding:20px 24px; margin-bottom:20px;
    }
    .missoes-banner::before {
      content:''; position:absolute; top:0; left:0; right:0; height:3px;
      background:linear-gradient(90deg, var(--amarelo), var(--roxo2), var(--amarelo));
    }
    .missoes-banner h1 { font-size:20px; color:var(--amarelo); display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .missoes-banner p { font-size:13px; color:var(--texto2); max-width:640px; }

    /* Grid de cards de missão */
    .missoes-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
    @media(max-width:800px) { .missoes-grid { grid-template-columns:repeat(2, 1fr); } }
    @media(max-width:500px) { .missoes-grid { grid-template-columns:1fr; } }

    .mcard {
      background:var(--card); backdrop-filter:blur(10px);
      border:1px solid var(--borda2); border-radius:var(--radius);
      padding:16px; display:flex; flex-direction:column; gap:10px;
      transition:border-color .2s;
    }
    .mcard:hover { border-color:var(--borda); }
    .mcard-head { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
    .mcard-head h4 { font-size:14px; color:var(--branco); line-height:1.3; }
    .mcard-icon {
      width:36px; height:36px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:16px;
      background:var(--amarelo-bg); color:var(--amarelo);
    }
    .mcard-desc { font-size:11.5px; color:var(--texto2); margin-top:-6px; }
    .mcard-tipo {
      align-self:flex-start; font-size:10px; font-weight:bold; padding:3px 10px; border-radius:20px;
      background:rgba(96,165,250,.12); color:var(--azul); border:1px solid rgba(96,165,250,.3);
    }

    .mcard-progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--texto2); }
    .mcard .progress-bar { height:6px; }

    .mcard-rewards { display:flex; flex-wrap:wrap; gap:6px; }
    .reward-chip { font-size:10.5px; font-weight:bold; padding:4px 10px; border-radius:8px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); white-space:nowrap; }
    .reward-chip.nct    { color:var(--amarelo); }
    .reward-chip.xp     { color:var(--azul); }
    .reward-chip.flores { color:var(--verde); }

    .mcard-btn { width:100%; padding:9px; border-radius:8px; border:none; font-size:12.5px; font-weight:bold; text-align:center; margin-top:auto; }
    .mcard-btn.coletada  { background:rgba(34,197,94,.15); color:var(--verde); cursor:default; }
    .mcard-btn.andamento { background:rgba(255,255,255,.05); color:var(--texto3); cursor:default; }
    .mcard-btn.coletar   { background:var(--verde); color:#fff; cursor:pointer; transition:filter .2s; }
    .mcard-btn.coletar:hover { filter:brightness(1.1); }
  </style>
</head>
