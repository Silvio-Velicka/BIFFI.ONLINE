<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra — BIFFI.ONLINE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rosa: #F2E6D3; --rosa-med: #D9BC8E; --roxo: #7A4A2D;
      --roxo-esc: #3D2817; --dourado: #C9A227; --branco: #fff;
    }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(160deg, #F2E6D3 0%, #EAD7B8 50%, #E3CC9E 100%);
      min-height: 100vh;
      color: var(--roxo-esc);
    }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 40px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(122,74,45,0.15);
    }
    .logo {
      font-size: 22px; font-weight: 900; letter-spacing: 3px; color: var(--roxo);
      text-decoration: none; text-shadow: 1px 1px 0 var(--dourado);
    }
    .voltar-loja {
      font-family: Arial, sans-serif; font-size: 13px; font-weight: 700;
      color: var(--roxo); text-decoration: none;
    }
    .voltar-loja:hover { text-decoration: underline; }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 110px 40px 90px;
    }

    .page-title { text-align: center; margin-bottom: 40px; }
    .page-title .emoji { font-size: 44px; display: block; margin-bottom: 10px; }
    .page-title h1 {
      font-size: 34px; color: var(--roxo); text-shadow: 3px 3px 0 var(--dourado);
      letter-spacing: 2px; margin-bottom: 10px;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 32px;
      align-items: start;
    }

    .card {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(122,74,45,0.2);
      border-radius: 20px;
      padding: 28px;
      font-family: Arial, sans-serif;
    }

    .card h2 {
      font-family: Georgia, serif;
      font-size: 20px;
      color: var(--roxo);
      margin-bottom: 20px;
      text-shadow: 1px 1px 0 var(--dourado);
    }

    .field { margin-bottom: 16px; }
    .field.half-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field label {
      display: block; font-size: 11px; font-weight: 700; color: var(--roxo);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 11px 13px; border-radius: 10px;
      border: 2px solid rgba(122,74,45,0.18);
      background: rgba(255,255,255,0.7);
      color: var(--roxo-esc); font-size: 14px; font-family: Arial, sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--roxo); }

    .field-row3 { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 12px; }

    .pagamento-opcoes { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
    .pagamento-opt {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px; border: 2px solid rgba(122,74,45,0.18); border-radius: 12px;
      cursor: pointer; background: rgba(255,255,255,0.4); transition: border-color 0.2s, background 0.2s;
    }
    .pagamento-opt input { accent-color: var(--roxo); }
    .pagamento-opt.selected { border-color: var(--roxo); background: rgba(255,255,255,0.75); }
    .pagamento-opt span.titulo { font-weight: 700; font-size: 13.5px; color: var(--roxo-esc); }
    .pagamento-opt span.desc { display: block; font-size: 11.5px; color: var(--roxo-esc); opacity: 0.75; }

    .resumo-itens { margin-bottom: 16px; }
    .resumo-item {
      display: flex; justify-content: space-between; gap: 10px;
      font-size: 13px; padding: 8px 0; border-bottom: 1px solid rgba(122,74,45,0.1);
    }
    .resumo-item .qtd { color: var(--roxo); font-weight: 700; }

    .resumo-linha {
      display: flex; justify-content: space-between; font-size: 13.5px; padding: 6px 0;
    }
    .resumo-linha.total {
      font-size: 17px; font-weight: 900; color: var(--roxo);
      border-top: 2px solid rgba(122,74,45,0.15); margin-top: 8px; padding-top: 12px;
    }

    .btn-finalizar-pedido {
      width: 100%; padding: 15px; margin-top: 18px;
      background: var(--roxo); color: #fff; border: none; border-radius: 50px;
      font-weight: 700; letter-spacing: 1px; font-size: 14.5px; cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-finalizar-pedido:hover { background: var(--roxo-esc); transform: translateY(-1px); }
    .btn-finalizar-pedido:disabled { opacity: 0.6; cursor: wait; }

    .aviso {
      margin-top: 14px; padding: 12px 14px; border-radius: 10px; font-size: 12.5px;
      display: none; line-height: 1.5;
    }
    .aviso.erro { background: rgba(220,50,50,0.12); color: #8a1f1f; display: block; }
    .aviso.ok { background: rgba(80,180,120,0.15); color: #2e7d4f; display: block; }

    .bloqueio, .vazio {
      text-align: center; font-family: Arial, sans-serif; color: var(--roxo-esc);
      padding: 60px 20px;
    }
    .bloqueio a, .vazio a {
      display: inline-block; margin-top: 18px; padding: 12px 30px;
      background: var(--roxo); color: #fff; border-radius: 50px; text-decoration: none; font-weight: 700;
    }

    .confirmacao {
      text-align: center; font-family: Arial, sans-serif; padding: 40px 20px;
    }
    .confirmacao .emoji-grande { font-size: 56px; display: block; margin-bottom: 16px; }
    .confirmacao h2 { font-family: Georgia, serif; color: var(--roxo); font-size: 26px; margin-bottom: 12px; }
    .confirmacao p { font-size: 14px; line-height: 1.7; margin-bottom: 8px; }
    .confirmacao .btns { margin-top: 24px; display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .confirmacao .btns a {
      padding: 12px 26px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 13px;
    }
    .confirmacao .btns .primario { background: var(--roxo); color: #fff; }
    .confirmacao .btns .secundario { background: transparent; border: 2px solid var(--roxo); color: var(--roxo); }

    @media (max-width: 800px) {
      .checkout-grid { grid-template-columns: 1fr; }
      .page { padding: 90px 20px 60px; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="index.html">BIFFI.ONLINE</a>
    <a class="voltar-loja" href="loja.html"><i class="fa-solid fa-arrow-left"></i> Voltar à loja</a>
  </header>

  <div class="page">
    <div class="page-title">
      <span class="emoji">🧾</span>
      <h1>Finalizar Compra</h1>
    </div>

    <div id="checkout-conteudo">
      <p style="text-align:center;font-family:Arial,sans-serif;">Carregando... 🐝</p>
    </div>
  </div>

  <script src="js/site-auth.js"></script>
  <script src="js/shop-api.js"></script>
  <script>
    const conteudo = document.getElementById('checkout-conteudo');

    async function iniciar() {
      // Exige login de verdade — consulta o servidor (SITE_AUTH.verificar()),
      // não só olha se existe um token guardado no localStorage. Assim, um
      // token expirado/inválido é detectado e limpo automaticamente, em vez
      // de deixar a tela quebrada mais adiante no processo de compra.
      const usuario = await SITE_AUTH.verificar();
      if (!usuario) {
        conteudo.innerHTML = `
          <div class="bloqueio">
            <p>Você precisa entrar na sua conta para finalizar a compra.</p>
            <p style="font-size:12.5px;opacity:.8;">É a mesma conta usada no Game Relax.</p>
            <a href="NectarMine/login.html?redirect=${encodeURIComponent('../checkout.html')}">Entrar / Criar conta</a>
          </div>
        `;
        return;
      }

      const itens = CART.itens();
      if (itens.length === 0) {
        conteudo.innerHTML = `
          <div class="vazio">
            <p>Seu carrinho está vazio.</p>
            <a href="loja.html">Ir para a loja</a>
          </div>
        `;
        return;
      }

      let perfil = { perfil: {}, enderecos: [] };
      try { perfil = await SHOP_API.perfil(); } catch (e) { /* segue com campos vazios */ }

      const enderecoPadrao = (perfil.enderecos || [])[0] || {};
      const subtotal = CART.totalCents();
      const frete = subtotal >= 15000 ? 0 : 1500;
      const total = subtotal + frete;

      conteudo.innerHTML = `
        <form id="form-checkout">
          <div class="checkout-grid">
            <div class="card">
              <h2>📦 Endereço de entrega</h2>

              <div class="field">
                <label>Nome do destinatário</label>
                <input type="text" id="f-nome" required value="${enderecoPadrao.nome_destinatario || perfil.perfil.nome_completo || ''}">
              </div>

              <div class="field half-row">
                <div>
                  <label>CPF</label>
                  <input type="text" id="f-cpf" required maxlength="14" placeholder="000.000.000-00" value="${perfil.perfil.cpf || ''}">
                </div>
                <div>
                  <label>Telefone / WhatsApp</label>
                  <input type="text" id="f-telefone" required placeholder="(11) 90000-0000" value="${perfil.perfil.telefone || ''}">
                </div>
              </div>

              <div class="field half-row">
                <div>
                  <label>CEP</label>
                  <input type="text" id="f-cep" required maxlength="9" placeholder="00000-000" value="${enderecoPadrao.cep || ''}">
                </div>
                <div>
                  <label>Rua</label>
                  <input type="text" id="f-rua" required value="${enderecoPadrao.rua || ''}">
                </div>
              </div>

              <div class="field field-row3">
                <div>
                  <label>Número</label>
                  <input type="text" id="f-numero" required value="${enderecoPadrao.numero || ''}">
                </div>
                <div>
                  <label>Complemento</label>
                  <input type="text" id="f-complemento" value="${enderecoPadrao.complemento || ''}">
                </div>
                <div>
                  <label>Bairro</label>
                  <input type="text" id="f-bairro" required value="${enderecoPadrao.bairro || ''}">
                </div>
              </div>

              <div class="field half-row">
                <div>
                  <label>Cidade</label>
                  <input type="text" id="f-cidade" required value="${enderecoPadrao.cidade || ''}">
                </div>
                <div>
                  <label>Estado (UF)</label>
                  <input type="text" id="f-estado" required maxlength="2" style="text-transform:uppercase;" value="${enderecoPadrao.estado || ''}">
                </div>
              </div>

              <h2 style="margin-top:8px;">💳 Forma de pagamento</h2>
              <div class="pagamento-opcoes">
                <label class="pagamento-opt selected">
                  <input type="radio" name="pagamento" value="mercadopago" checked>
                  <span>
                    <span class="titulo">Mercado Pago</span>
                    <span class="desc">PIX, cartão ou boleto. (Integração em configuração — pode cair no modo combinar depois.)</span>
                  </span>
                </label>
                <label class="pagamento-opt">
                  <input type="radio" name="pagamento" value="paypal">
                  <span>
                    <span class="titulo">PayPal</span>
                    <span class="desc">Cartão internacional via PayPal. (Integração em configuração.)</span>
                  </span>
                </label>
                <label class="pagamento-opt">
                  <input type="radio" name="pagamento" value="manual">
                  <span>
                    <span class="titulo">Combinar depois (PIX/transferência manual)</span>
                    <span class="desc">Registramos seu pedido e entramos em contato pelo WhatsApp para combinar o pagamento.</span>
                  </span>
                </label>
              </div>
            </div>

            <div class="card">
              <h2>🧾 Resumo do pedido</h2>
              <div class="resumo-itens">
                ${itens.map(i => `
                  <div class="resumo-item">
                    <span><span class="qtd">${i.quantidade}x</span> ${i.nome}</span>
                    <span>${formatarReais(i.preco_cents * i.quantidade)}</span>
                  </div>
                `).join('')}
              </div>
              <div class="resumo-linha"><span>Subtotal</span><span>${formatarReais(subtotal)}</span></div>
              <div class="resumo-linha"><span>Frete</span><span>${frete === 0 ? 'Grátis' : formatarReais(frete)}</span></div>
              <div class="resumo-linha total"><span>Total</span><span>${formatarReais(total)}</span></div>

              <button type="submit" class="btn-finalizar-pedido" id="btn-finalizar-pedido">Confirmar pedido</button>
              <div class="aviso" id="checkout-aviso"></div>
            </div>
          </div>
        </form>
      `;

      // Realça visualmente a opção de pagamento escolhida
      document.querySelectorAll('.pagamento-opt input').forEach(r => {
        r.addEventListener('change', () => {
          document.querySelectorAll('.pagamento-opt').forEach(o => o.classList.remove('selected'));
          r.closest('.pagamento-opt').classList.add('selected');
        });
      });

      // Busca automática de endereço pelo CEP (ViaCEP — API pública, sem chave)
      document.getElementById('f-cep').addEventListener('blur', async (e) => {
        const cep = e.target.value.replace(/\D/g, '');
        if (cep.length !== 8) return;
        try {
          const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
          const data = await resp.json();
          if (!data.erro) {
            document.getElementById('f-rua').value = data.logradouro || document.getElementById('f-rua').value;
            document.getElementById('f-bairro').value = data.bairro || document.getElementById('f-bairro').value;
            document.getElementById('f-cidade').value = data.localidade || document.getElementById('f-cidade').value;
            document.getElementById('f-estado').value = data.uf || document.getElementById('f-estado').value;
          }
        } catch (e) { /* silencioso — usuário preenche manualmente */ }
      });

      document.getElementById('form-checkout').addEventListener('submit', finalizarPedido);
    }

    async function finalizarPedido(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-finalizar-pedido');
      const aviso = document.getElementById('checkout-aviso');
      aviso.className = 'aviso';
      aviso.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Processando...';

      const payload = {
        itens: CART.itens().map(i => ({ produto_id: i.produto_id, quantidade: i.quantidade })),
        endereco: {
          nome_destinatario: document.getElementById('f-nome').value.trim(),
          cpf: document.getElementById('f-cpf').value.trim(),
          telefone: document.getElementById('f-telefone').value.trim(),
          cep: document.getElementById('f-cep').value.trim(),
          rua: document.getElementById('f-rua').value.trim(),
          numero: document.getElementById('f-numero').value.trim(),
          complemento: document.getElementById('f-complemento').value.trim(),
          bairro: document.getElementById('f-bairro').value.trim(),
          cidade: document.getElementById('f-cidade').value.trim(),
          estado: document.getElementById('f-estado').value.trim().toUpperCase(),
        },
        metodo_pagamento: document.querySelector('input[name="pagamento"]:checked').value,
      };

      try {
        const resultado = await SHOP_API.checkout(payload);
        CART.limpar();

        if (resultado.pagamento_url) {
          conteudo.innerHTML = `<p style="text-align:center;font-family:Arial,sans-serif;">Redirecionando para o pagamento... 🐝</p>`;
          location.href = resultado.pagamento_url;
          return;
        }

        conteudo.innerHTML = `
          <div class="card confirmacao">
            <span class="emoji-grande">🐝💌</span>
            <h2>Pedido #${resultado.pedido_id} registrado!</h2>
            <p>${resultado.aviso || 'Em breve entraremos em contato para combinar os próximos passos.'}</p>
            <p style="font-weight:700;">Total: ${formatarReais(resultado.total_cents)}</p>
            <div class="btns">
              <a class="primario" href="meus-pedidos.html">Ver meus pedidos</a>
              <a class="secundario" href="loja.html">Voltar à loja</a>
            </div>
          </div>
        `;
      } catch (err) {
        aviso.textContent = err.message || 'Não foi possível finalizar o pedido. Tente novamente em instantes.';
        aviso.classList.add('erro');
        btn.disabled = false;
        btn.textContent = 'Confirmar pedido';
      }
    }

    iniciar();
  </script>

</body>
</html>
