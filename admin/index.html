<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — BIFFI.ONLINE</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rosa:      #FFB6D9;
      --rosa-med:  #F472B6;
      --roxo:      #8B2D8F;
      --roxo-esc:  #5B1060;
      --dourado:   #FFD700;
      --branco:    #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #FFB6D9 0%, #FFC0E0 50%, #FFD1EB 100%);
      min-height: 100vh;
      color: var(--roxo-esc);
      display: flex;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(139,45,143,0.15);
      min-height: 100vh;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar .logo {
      font-family: Georgia, serif;
      font-size: 18px;
      font-weight: bold;
      color: var(--roxo);
      text-shadow: 1px 1px 0 var(--dourado);
      padding: 0 20px 20px;
      letter-spacing: 1px;
    }
    .sidebar .logo span { display: block; font-size: 11px; font-weight: normal; color: var(--roxo-esc); letter-spacing: 0.5px; margin-top: 2px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      color: var(--roxo-esc);
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.2s;
    }
    .nav-item .icon { font-size: 17px; width: 20px; text-align: center; }
    .nav-item:hover { background: rgba(255,255,255,0.4); }
    .nav-item.active {
      background: rgba(255,255,255,0.55);
      border-left-color: var(--roxo);
      color: var(--roxo);
    }

    .sidebar-footer { margin-top: auto; padding: 0 20px; }
    .btn-sair {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(139,45,143,0.3);
      border-radius: 8px;
      background: transparent;
      color: var(--roxo-esc);
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sair:hover { background: rgba(139,45,143,0.1); }

    /* ── CONTEÚDO ── */
    .content { flex: 1; padding: 40px 48px; max-width: 720px; }

    .content h1 {
      font-family: Georgia, serif;
      font-size: 26px;
      color: var(--roxo);
      text-shadow: 2px 2px 0 var(--dourado);
      margin-bottom: 6px;
    }
    .content .subtitle { font-size: 13px; color: var(--roxo-esc); margin-bottom: 32px; }

    .card {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(139,45,143,0.15);
      border-radius: 18px;
      padding: 28px 30px;
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      color: var(--roxo);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 7px;
    }
    .field input, .field textarea {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 2px solid rgba(139,45,143,0.18);
      background: rgba(255,255,255,0.65);
      color: var(--roxo-esc);
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .field textarea { min-height: 80px; line-height: 1.5; }
    .field input:focus, .field textarea:focus { border-color: var(--roxo); }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      font-size: 13px;
      font-weight: bold;
      color: var(--roxo-esc);
    }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--roxo); cursor: pointer; }

    .actions { display: flex; align-items: center; gap: 14px; }

    .btn-salvar {
      padding: 12px 26px;
      border: none;
      border-radius: 10px;
      background: var(--roxo);
      color: var(--branco);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-salvar:hover { background: var(--roxo-esc); transform: translateY(-1px); }
    .btn-salvar:disabled { opacity: 0.6; cursor: wait; }

    .btn-preview {
      padding: 12px 20px;
      border: 2px solid var(--roxo);
      border-radius: 10px;
      background: transparent;
      color: var(--roxo);
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-preview:hover { background: rgba(139,45,143,0.08); }

    .save-msg {
      display: none;
      margin-top: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: bold;
    }
    .save-msg.ok { background: rgba(80,180,120,0.15); color: #2e7d4f; display: block; }
    .save-msg.err { background: rgba(139,45,143,0.12); color: var(--roxo-esc); display: block; }

    @media (max-width: 700px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; min-height: auto; flex-direction: row; overflow-x: auto; }
      .sidebar .logo, .sidebar-footer { display: none; }
      .content { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">🐝 BIFFI.ONLINE<span>Painel Admin</span></div>

    <div class="nav-item active" data-view="anuncio">
      <span class="icon">📢</span> Modal do Jogo
    </div>

    <div class="sidebar-footer">
      <button class="btn-sair" id="btn-sair"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
    </div>
  </div>

  <div class="content">
    <h1>📢 Modal do Jogo</h1>
    <p class="subtitle">Mensagem que aparece toda vez que alguém abre a tela de login/cadastro do NectarMine.</p>

    <div class="card">
      <form id="form-anuncio">
        <div class="toggle-row">
          <input type="checkbox" id="f-ativo" checked>
          <label for="f-ativo" style="margin:0;text-transform:none;letter-spacing:0;">Modal ativo (exibir para os jogadores)</label>
        </div>

        <div class="field">
          <label>Título</label>
          <input type="text" id="f-titulo" maxlength="120" required>
        </div>

        <div class="field">
          <label>Texto</label>
          <textarea id="f-texto" maxlength="500" required></textarea>
        </div>

        <div class="field">
          <label>Subtítulo</label>
          <input type="text" id="f-subtitulo" maxlength="120">
        </div>

        <div class="field">
          <label>Texto</label>
          <textarea id="f-texto2" maxlength="500"></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-salvar" id="btn-salvar">
            <i class="fa-solid fa-floppy-disk"></i> Salvar
          </button>
          <button type="button" class="btn-preview" id="btn-preview">
            <i class="fa-solid fa-eye"></i> Ver como fica
          </button>
        </div>

        <div class="save-msg" id="save-msg"></div>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    BiffiAdmin.requireAuth();

    const form = document.getElementById('form-anuncio');
    const msg = document.getElementById('save-msg');

    async function carregar() {
      try {
        const a = await BiffiAdmin.getAnnouncement();
        document.getElementById('f-ativo').checked = !!a.ativo;
        document.getElementById('f-titulo').value = a.titulo || '';
        document.getElementById('f-texto').value = a.texto || '';
        document.getElementById('f-subtitulo').value = a.subtitulo || '';
        document.getElementById('f-texto2').value = a.texto2 || '';
      } catch (err) {
        msg.className = 'save-msg err';
        msg.textContent = 'Não foi possível carregar os dados atuais: ' + err.message;
      }
    }
    carregar();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-salvar');
      btn.disabled = true;
      msg.className = 'save-msg';
      msg.style.display = 'none';
      try {
        await BiffiAdmin.saveAnnouncement({
          ativo: document.getElementById('f-ativo').checked,
          titulo: document.getElementById('f-titulo').value,
          texto: document.getElementById('f-texto').value,
          subtitulo: document.getElementById('f-subtitulo').value,
          texto2: document.getElementById('f-texto2').value,
        });
        msg.className = 'save-msg ok';
        msg.textContent = '✔ Salvo! A mudança já vale para a próxima vez que alguém abrir a tela de login.';
      } catch (err) {
        msg.className = 'save-msg err';
        msg.textContent = 'Erro ao salvar: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('btn-preview').addEventListener('click', () => {
      Swal.fire({
        title: document.getElementById('f-titulo').value || '(sem título)',
        html: `
          ${document.getElementById('f-texto').value ? `<p style="color:#D4C9E8;font-size:14px;line-height:1.7;margin-bottom:16px;">${document.getElementById('f-texto').value}</p>` : ''}
          ${document.getElementById('f-subtitulo').value ? `<h3 style="color:#FFD700;font-size:15px;margin-bottom:8px;">${document.getElementById('f-subtitulo').value}</h3>` : ''}
          ${document.getElementById('f-texto2').value ? `<p style="color:#9E8FC0;font-size:13px;line-height:1.6;">${document.getElementById('f-texto2').value}</p>` : ''}
        `,
        background: '#0A1220',
        color: '#D4C9E8',
        confirmButtonText: 'Continuar',
        confirmButtonColor: '#FFD700',
      });
    });

    document.getElementById('btn-sair').addEventListener('click', () => BiffiAdmin.logout());
  </script>
</body>
</html>
