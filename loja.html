<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja — BIFFI.ONLINE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --rosa:      #F2E6D3;
      --rosa-med:  #D9BC8E;
      --roxo:      #7A4A2D;
      --roxo-esc:  #3D2817;
      --dourado:   #C9A227;
      --branco:    #fff;
    }

    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(160deg, #F2E6D3 0%, #EAD7B8 50%, #E3CC9E 100%);
      min-height: 100vh;
      color: var(--roxo-esc);
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 40px;
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(122,74,45,0.15);
      gap: 16px;
    }

    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      color: var(--roxo);
      text-decoration: none;
      text-shadow: 1px 1px 0 var(--dourado);
      flex-shrink: 0;
    }

    nav { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; flex: 1; }

    nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      text-decoration: none;
      width: 88px;
      padding: 7px 4px;
      border: 2px solid var(--roxo);
      border-radius: 12px;
      background: rgba(255,255,255,0.3);
      transition: background 0.2s, transform 0.2s;
      box-sizing: border-box;
    }

    nav a.active,
    nav a:hover {
      background: rgba(255,255,255,0.6);
      transform: translateY(-2px);
    }

    nav a .icon { font-size: 18px; }
    nav a .label {
      font-size: 9px;
      font-weight: 700;
      color: var(--roxo);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-family: Arial, sans-serif;
      line-height: 1.15;
      text-align: center;
    }

    .btn-cart {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      border: 2px solid var(--roxo);
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      color: var(--roxo);
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-cart:hover { background: rgba(255,255,255,0.7); transform: translateY(-2px); }
    .cart-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: var(--dourado);
      color: var(--roxo-esc);
      font-family: Arial, sans-serif;
      font-size: 11px;
      font-weight: 900;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .cart-badge.hidden { display: none; }

    .bee {
      position: fixed;
      font-size: 20px;
      z-index: 1;
      pointer-events: none;
    }
    .bee-1  { animation: bee1  12s infinite ease-in-out; }
    .bee-2  { animation: bee2  14s infinite ease-in-out; }
    .bee-3  { animation: bee3  16s infinite ease-in-out; }
    .bee-4  { animation: bee4  13s infinite ease-in-out; }
    .bee-5  { animation: bee5  15s infinite ease-in-out; }
    .bee-6  { animation: bee6  17s infinite ease-in-out; }
    .bee-7  { animation: bee7  11s infinite ease-in-out; }
    .bee-8  { animation: bee8  18s infinite ease-in-out; }
    .bee-9  { animation: bee9  13s infinite ease-in-out; }
    .bee-10 { animation: bee10 15s infinite ease-in-out; }
    @keyframes bee1  { 0%{left:10%;top:15%} 25%{left:40%;top:10%} 50%{left:70%;top:35%} 75%{left:40%;top:60%} 100%{left:10%;top:15%} }
    @keyframes bee2  { 0%{right:10%;top:25%} 25%{right:35%;top:15%} 50%{right:60%;top:45%} 75%{right:35%;top:70%} 100%{right:10%;top:25%} }
    @keyframes bee3  { 0%{left:5%;bottom:25%} 25%{left:30%;bottom:35%} 50%{left:60%;bottom:20%} 75%{left:35%;bottom:10%} 100%{left:5%;bottom:25%} }
    @keyframes bee4  { 0%{right:8%;bottom:30%} 25%{right:40%;bottom:25%} 50%{right:70%;bottom:40%} 75%{right:40%;bottom:55%} 100%{right:8%;bottom:30%} }
    @keyframes bee5  { 0%{left:45%;top:5%} 25%{left:25%;top:25%} 50%{left:55%;top:50%} 75%{left:75%;top:30%} 100%{left:45%;top:5%} }
    @keyframes bee6  { 0%{right:5%;top:40%} 25%{right:30%;top:20%} 50%{right:50%;top:55%} 75%{right:20%;top:70%} 100%{right:5%;top:40%} }
    @keyframes bee7  { 0%{left:15%;top:50%} 25%{left:35%;top:35%} 50%{left:65%;top:60%} 75%{left:50%;top:20%} 100%{left:15%;top:50%} }
    @keyframes bee8  { 0%{right:20%;top:10%} 25%{right:45%;top:35%} 50%{right:15%;top:60%} 75%{right:50%;top:40%} 100%{right:20%;top:10%} }
    @keyframes bee9  { 0%{left:35%;bottom:15%} 25%{left:55%;bottom:30%} 50%{left:25%;bottom:50%} 75%{left:60%;bottom:25%} 100%{left:35%;bottom:15%} }
    @keyframes bee10 { 0%{right:30%;bottom:20%} 25%{right:50%;bottom:40%} 50%{right:10%;bottom:50%} 75%{right:60%;bottom:30%} 100%{right:30%;bottom:20%} }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 110px 40px 70px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 56px;
    }

    .page-title .emoji { font-size: 48px; display: block; margin-bottom: 12px; }

    .page-title .logo-loja {
      width: 190px;
      height: auto;
      margin: 0 auto 12px;
      display: block;
    }

    .page-title h1 {
      font-size: 40px;
      color: var(--roxo);
      text-shadow: 3px 3px 0 var(--dourado);
      letter-spacing: 3px;
      margin-bottom: 12px;
    }

    .page-title p {
      font-size: 15px;
      color: var(--roxo-esc);
      font-family: Arial, sans-serif;
      line-height: 1.6;
    }

    /* ── LISTA DE PRODUTOS (um embaixo do outro, sem destaques) ── */
    .product-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .product-row-card {
      display: flex;
      align-items: center;
      gap: 24px;
      background: rgba(255,255,255,0.45);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(122,74,45,0.18);
      border-radius: 18px;
      padding: 20px 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .product-row-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(122,74,45,0.16);
    }

    .product-row-thumb {
      flex-shrink: 0;
      width: 96px;
      height: 96px;
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      overflow: hidden;
    }

    .product-row-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-row-info { flex: 1; min-width: 0; }

    .badge {
      display: inline-block;
      background: var(--dourado);
      color: var(--roxo-esc);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 50px;
      font-family: Arial, sans-serif;
      margin-bottom: 6px;
    }

    .product-row-info h3 {
      font-size: 17px;
      color: var(--roxo);
      margin-bottom: 4px;
      font-family: Arial, sans-serif;
      font-weight: 700;
    }

    .product-row-info p {
      font-size: 13px;
      line-height: 1.5;
      color: var(--roxo-esc);
      font-family: Arial, sans-serif;
      opacity: 0.85;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-row-price {
      font-size: 19px;
      font-weight: 900;
      color: var(--roxo);
      font-family: Arial, sans-serif;
    }

    .product-row-actions { flex-shrink: 0; }

    .btn-small {
      display: inline-block;
      padding: 10px 24px;
      background: var(--roxo);
      color: var(--branco);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      font-family: Arial, sans-serif;
      transition: background 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-small:hover { background: var(--roxo-esc); }
    .btn-small:disabled { opacity: 0.5; cursor: not-allowed; }

    .loja-msg {
      text-align: center;
      font-family: Arial, sans-serif;
      color: var(--roxo-esc);
      padding: 30px;
    }

    /* ── CARRINHO (drawer) ── */
    .cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 300;
      display: none;
    }
    .cart-overlay.open { display: block; }

    .cart-drawer {
      position: fixed;
      top: 0; right: 0;
      width: 100%;
      max-width: 380px;
      height: 100%;
      background: linear-gradient(160deg, #E3CC9E 0%, #EAD7B8 100%);
      z-index: 301;
      box-shadow: -8px 0 30px rgba(0,0,0,0.25);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }
    .cart-drawer.open { transform: translateX(0); }

    .cart-header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(122,74,45,0.2);
    }
    .cart-header h2 { font-size: 20px; color: var(--roxo); }
    .cart-close {
      background: none; border: none; font-size: 20px; color: var(--roxo);
      cursor: pointer;
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .cart-empty {
      text-align: center;
      font-family: Arial, sans-serif;
      color: var(--roxo-esc);
      padding: 40px 10px;
      font-size: 14px;
    }

    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(122,74,45,0.12);
      font-family: Arial, sans-serif;
    }

    .cart-item-thumb {
      width: 52px; height: 52px;
      border-radius: 10px;
      background: rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-info h4 { font-size: 13px; color: var(--roxo-esc); margin-bottom: 4px; }
    .cart-item-info .cart-item-price { font-size: 13px; font-weight: 700; color: var(--roxo); }

    .qty-control {
      display: flex; align-items: center; gap: 6px;
      margin-top: 6px;
    }
    .qty-control button {
      width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--roxo);
      background: rgba(255,255,255,0.6); color: var(--roxo); font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 13px; line-height: 1;
    }
    .qty-control span { font-size: 13px; min-width: 16px; text-align: center; }

    .cart-item-remove {
      background: none; border: none; color: var(--rosa-med); font-size: 15px; cursor: pointer;
    }

    .cart-footer {
      padding: 20px 24px;
      border-top: 1px solid rgba(122,74,45,0.2);
      font-family: Arial, sans-serif;
    }
    .cart-total {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 16px; font-weight: 700; color: var(--roxo); margin-bottom: 14px;
    }
    .btn-checkout {
      display: block; width: 100%; text-align: center;
      padding: 14px; background: var(--roxo); color: #fff; border: none; border-radius: 50px;
      font-weight: 700; letter-spacing: 1px; font-size: 14px; cursor: pointer;
      text-decoration: none;
    }
    .btn-checkout:hover { background: var(--roxo-esc); }
    .btn-checkout:disabled { opacity: 0.5; cursor: not-allowed; }

    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      text-align: center;
      padding: 14px 20px;
      color: var(--roxo);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      border-top: 1px solid rgba(122,74,45,0.15);
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
    }

    .contacts {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: var(--roxo);
      font-weight: 700;
      letter-spacing: 1px;
    }

    .contacts-label { white-space: nowrap; }

    .contacts a {
      color: var(--roxo);
      font-size: 18px;
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
      display: inline-flex;
    }

    .contacts a:hover {
      color: var(--roxo-esc);
      transform: scale(1.25);
    }

    .dev-link {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-weight: 700;
      color: var(--roxo);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 2px;
      font-family: Arial, sans-serif;
    }

    .dev-tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 10px);
      right: 0;
      background: rgba(61,40,23,0.95);
      color: #fff;
      font-size: 12px;
      font-weight: normal;
      letter-spacing: 0;
      padding: 10px 16px;
      border-radius: 10px;
      white-space: nowrap;
      line-height: 1.7;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: opacity 0.2s, visibility 0.2s;
    }

    .dev-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      right: 14px;
      border: 6px solid transparent;
      border-top-color: rgba(61,40,23,0.95);
    }

    .dev-link:hover .dev-tooltip {
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 700px) {
      header { padding: 12px 16px; }
      .logo { font-size: 17px; }
      nav a { width: 44px; padding: 6px; }
      nav a .label { display: none; }
      .page { padding: 90px 16px 60px; }
      .product-row-card { flex-direction: column; text-align: center; padding: 20px; }
      .product-row-info p { -webkit-line-clamp: 3; }
      .cart-drawer { max-width: 100%; }
    }
  </style>
</head>
